          Feature: Add clear button to ion-input

          Users need a quick way to clear input fields. This is common
          in mobile apps and improves UX. The clear button should appear
          when the input has a value and clear the input when clicked.
  prompt: |
    I need to create a design document for this feature request. What sections
    should I include and what details are required before implementation can begin?
