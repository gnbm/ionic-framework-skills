      - point: "Validates feature criteria"
        description: "Checks against the three acceptance criteria"
      - point: "Requires design document"
        description: "Mentions that features require design documents"
      - point: "Lists required sections"
        description: "Outlines the sections needed in design document"
    skill_scoring:
      - point: "Mentions acceptance criteria"
        description: "References concrete use case, burden analysis, general problem solution"
      - point: "Includes API section"
        description: "Design should include proposed API (properties, events, methods)"
      - point: "Includes implementation details"
        description: "Design should cover component structure and behavior"
      - point: "Includes testing strategy"
        description: "Design should outline unit and E2E testing approach"
      - point: "Includes platform considerations"
        description: "Design should address iOS and Material Design differences"
      - point: "Mentions review process"
        description: "Explains team review and approval process"

scenario_7:
  name: "adding_tests_to_component"
  read_references:
    - reference/testing.md
    - reference/stencil.md
  codebase:
    files:
      - path: "src/components/toggle/toggle.tsx"
        content: |
          import { Component, Event, EventEmitter, Prop, h } from '@stencil/core';

          @Component({
            tag: 'ion-toggle',
            shadow: true,
          })
          export class Toggle {
            @Prop() checked = false;
            @Event() ionChange!: EventEmitter<{ checked: boolean }>;

            private handleClick = () => {
              this.checked = !this.checked;
              this.ionChange.emit({ checked: this.checked });
            }

            render() {
              return (
                <Host onClick={this.handleClick}>
                  <div class={`toggle ${this.checked ? 'checked' : ''}`}>
                    <div class="toggle-icon" />
                  </div>
                </Host>
              );
            }
          }
  prompt: |
    Write comprehensive tests for this toggle component including both
    unit tests and E2E tests. Follow Ionic Framework testing conventions.
  validation:
    prerequisites:
      - point: "Creates unit test file"
        description: "Suggests creating toggle.spec.ts file"
      - point: "Creates E2E test file"
        description: "Suggests creating toggle.e2e.ts file"
      - point: "Uses correct test fixtures"
        description: "Uses newSpecPage for unit tests, custom test fixture for E2E"
    skill_scoring:
      - point: "Tests checked property"
        description: "Unit test verifies checked property behavior"
      - point: "Tests ionChange event"
        description: "Unit test verifies event emission with correct detail"
      - point: "Tests click interaction"
        description: "E2E test verifies clicking toggles the state"
      - point: "Tests visual rendering"
        description: "E2E test includes screenshot test"
      - point: "Uses configs generator"
        description: "E2E test uses configs() to test multiple modes"
      - point: "Waits for changes"
        description: "Tests use waitForChanges() after state updates"
